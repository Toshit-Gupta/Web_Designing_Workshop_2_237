<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Puma Navbar</title>

<!-- Font Awesome Icons -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
}

/* NAVBAR */
.navbar{
background:#111;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px 40px;
}

/* LEFT SECTION */
.nav-left{
display:flex;
align-items:center;
gap:30px;
}

/* LOGO */
.logo{
font-size:28px;
font-weight:bold;
}

/* MENU */
.nav-links{
display:flex;
gap:25px;
}

.nav-links a{
color:white;
text-decoration:none;
font-weight:600;
font-size:15px;
}

.nav-links a:hover{
color:#ccc;
}

/* RIGHT SECTION */
.nav-right{
display:flex;
align-items:center;
gap:20px;
}

/* SEARCH BOX */
.search-box{
border:1px solid gray;
padding:8px 15px;
display:flex;
align-items:center;
gap:10px;
}

.search-box input{
background:transparent;
border:none;
outline:none;
color:white;
}

.search-box i{
color:white;
}

/* ICONS */
.icons i{
font-size:18px;
cursor:pointer;
}

.icons i:hover{
color:#ccc;
}

</style>
</head>

<body>

<nav class="navbar">

<div class="nav-left">
 <div class="logo">
<img src="photo.png" alt="PUMA Logo" width="30" height="30">
<span>PUMA</span>
</div>

<div class="logo">PUMA</div>

<div class="nav-links">
<a href="#">New</a>
<a href="#">Sports</a>
<a href="#">Men</a>
<a href="#">Women</a>
<a href="#">Motorsport</a>
<a href="#">Lifestyle</a>
<a href="#">Kids</a>
<a href="#">Sale</a>
</div>

</div>


<div class="nav-right">

<div class="search-box">
<i class="fa fa-search"></i>
<input type="text" placeholder="SEARCH">
</div>

<div class="icons">
<i class="fa-regular fa-heart"></i>
</div>

<div class="icons">
<i class="fa-solid fa-cart-shopping"></i>
</div>

<div class="icons">
<i class="fa-regular fa-user"></i>
</div>

</div>

</nav>

</body>
</html>
